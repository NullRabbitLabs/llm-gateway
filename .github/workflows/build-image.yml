name: Build and Push Image

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-llm-gateway
  cancel-in-progress: true

jobs:
  build:
    runs-on: [self-hosted, linux, x64, nullrabbit]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push
        run: |
          IMAGE=ghcr.io/nullrabbitlabs/llm-gateway
          docker build -t $IMAGE:latest -t $IMAGE:${{ github.sha }} .
          docker push $IMAGE:latest
          docker push $IMAGE:${{ github.sha }}

      - name: Trigger slashr deploy
        if: github.ref == 'refs/heads/main'
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.DISPATCH_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/NullRabbitLabs/slasher-infra/dispatches \
            -d '{"event_type": "service-updated"}'
